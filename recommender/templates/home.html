<!DOCTYPE html>
<html>

<head>

    <title>Fitness Recommendation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        AI Fitness Recommendation System
    </h1>

    <div class="card p-4">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Age
                </label>

                <input
                    type="number"
                    name="age"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Weight (KG)
                </label>

                <input
                    type="number"
                    step="0.1"
                    name="weight"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Height (CM)
                </label>

                <input
                    type="number"
                    step="0.1"
                    name="height"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Diet Preference
                </label>

                <select
                    name="diet"
                    class="form-select"
                >

                    <option>Vegetarian</option>
                    <option>Vegan</option>
                    <option>Keto</option>
                    <option>Balanced</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Fitness Goal
                </label>

                <select
                    name="goal"
                    class="form-select"
                >

                    <option>Weight Loss</option>
                    <option>Muscle Gain</option>
                    <option>Maintenance</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Experience Level
                </label>

                <select
                    name="experience"
                    class="form-select"
                >

                    <option>Beginner</option>
                    <option>Intermediate</option>
                    <option>Advanced</option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100"
            >

                Get Recommendation

            </button>

        </form>

    </div>

</div>

</body>

</html>
